name: Auto-Rerun on Scrape Failure

# When the Daily Shareholding Scrape workflow fails (e.g. timeout),
# wait 30 minutes then re-trigger it. Resume picks up from last checkpoint.
# Caps at 3 retries per day to prevent infinite loops.

on:
  workflow_run:
    workflows: ["Daily Shareholding Scrape"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  rerun:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 4 }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes (let logs flush, avoid hot retry)
        run: sleep 1800

      - name: Re-trigger scrape workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/scrape.yml/dispatches \
            -f ref=main \
            && echo "Re-triggered scrape (attempt $((${{ github.event.workflow_run.run_attempt }} + 1)))"
