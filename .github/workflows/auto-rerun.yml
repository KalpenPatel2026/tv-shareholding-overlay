name: Auto-Rerun on Scrape Failure

# Re-trigger scrape ONCE if a fail occurred and progress is still <90%.
# Hard caps:
#   - only fires if extension/data.json shows <90% coverage (else done)
#   - never re-triggers within 2 hours of last re-trigger (anti-loop)
#   - skips if a Daily Shareholding Scrape is already running (concurrency)

on:
  workflow_run:
    workflows: ["Daily Shareholding Scrape"]
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: auto-rerun
  cancel-in-progress: false

jobs:
  rerun:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check coverage before re-triggering
        id: gate
        run: |
          STOCKS=$(python -c "import json; d=json.load(open('extension/data.json')); print(len(d.get('stocks',{})))")
          UNIVERSE=$(wc -l < universe.csv)
          PCT=$(python -c "print($STOCKS / ($UNIVERSE - 1) * 100)")
          echo "coverage=$PCT" >> $GITHUB_OUTPUT
          if (( $(echo "$PCT >= 90" | bc -l) )); then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Coverage ${PCT}% >= 90% — no need to re-trigger."
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Coverage ${PCT}% — will re-trigger."
          fi

      - name: Wait 30 min
        if: steps.gate.outputs.should_run == 'true'
        run: sleep 1800

      - name: Re-trigger scrape
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/scrape.yml/dispatches \
            -f ref=main
          echo "Re-triggered scrape (coverage was ${{ steps.gate.outputs.coverage }}%)."
