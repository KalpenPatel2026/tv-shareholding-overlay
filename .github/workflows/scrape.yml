name: Daily Shareholding Scrape

# Runs nightly at 21:30 IST (16:00 UTC) — after BSE/NSE filing windows close.
# Cron is in UTC.
on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:   # also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore screener cookie from secret
        env:
          SCREENER_COOKIE: ${{ secrets.SCREENER_COOKIE }}
        run: |
          mkdir -p .secrets
          if [ -z "$SCREENER_COOKIE" ]; then
            echo "WARN: SCREENER_COOKIE secret not set; proceeding without screener_pro." >&2
          else
            printf '%s' "$SCREENER_COOKIE" > .secrets/screener_cookie.txt
          fi

      - name: Refresh universe
        run: python fetch_universe.py
        continue-on-error: true

      - name: Run scrape
        run: python scrape_shareholding.py --delay 0.7

      - name: Drop cookie before commit (safety)
        if: always()
        run: rm -f .secrets/screener_cookie.txt

      - name: Commit refreshed data.json
        run: |
          git config user.name "tv-overlay-bot"
          git config user.email "noreply@github.com"
          git add extension/data.json universe.csv || true
          git diff --cached --quiet && echo "No changes to commit." && exit 0 || true
          git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
