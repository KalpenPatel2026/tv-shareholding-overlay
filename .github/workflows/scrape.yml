name: Daily Shareholding Scrape

# Runs nightly at 21:30 IST (16:00 UTC) — after BSE/NSE filing windows close.
# Cron is in UTC.
on:
  schedule:
    - cron: "0 16 * * *"   # 21:30 IST nightly
    - cron: "0 4 * * *"    # 09:30 IST morning (catches slip-overs from previous run)
    - cron: "0 22 * * *"   # 03:30 IST late-night (continuation pass for huge universe)
  workflow_dispatch:   # also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore screener cookie from secret
        env:
          SCREENER_COOKIE: ${{ secrets.SCREENER_COOKIE }}
        run: |
          mkdir -p .secrets
          if [ -z "$SCREENER_COOKIE" ]; then
            echo "WARN: SCREENER_COOKIE secret not set; proceeding without screener_pro." >&2
          else
            printf '%s' "$SCREENER_COOKIE" > .secrets/screener_cookie.txt
          fi

      - name: Refresh universe
        run: python fetch_universe.py
        continue-on-error: true

      - name: Run scrape with periodic checkpoint commits
        run: |
          set -e
          git config user.name "tv-overlay-bot"
          git config user.email "noreply@github.com"

          # Background committer: every 15 min, push whatever data.json exists now.
          # Survives if main scrape times out. Stops itself when scrape exits.
          (
            sleep 900
            while pgrep -f "scrape_shareholding.py" >/dev/null 2>&1; do
              git pull --rebase --autostash >/dev/null 2>&1 || true
              git add extension/data.json universe.csv 2>/dev/null || true
              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "data: checkpoint $(date -u +%Y-%m-%dT%H:%MZ)" >/dev/null 2>&1 || true
                git push >/dev/null 2>&1 || true
                echo "[checkpoint] committed at $(date -u +%H:%MZ)"
              fi
              sleep 900
            done
          ) &
          CHECKPOINT_PID=$!

          # Main scrape
          python -u scrape_shareholding.py --resume --delay 0.3 \
            --providers screener_pro,tickertape || SCRAPE_RC=$?

          # Stop checkpoint loop
          kill $CHECKPOINT_PID 2>/dev/null || true
          exit ${SCRAPE_RC:-0}
        timeout-minutes: 330

      - name: Drop cookie before commit (safety)
        if: always()
        run: rm -f .secrets/screener_cookie.txt

      - name: Final commit refreshed data.json
        if: always()
        run: |
          git config user.name "tv-overlay-bot"
          git config user.email "noreply@github.com"
          git pull --rebase --autostash || true
          git add extension/data.json universe.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: final $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
